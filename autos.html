       <div class="galeria">
    <!-- Carro 1 -->
    <div class="carro">
        <img src="./img/bettle.jpg.jpg" alt="Bettle" width="300" 
             onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">
        <p><i>Rolls-Royce Bettle</i></p>
    </div>

    <!-- Carro 2 -->
    <div class="carro">
        <img src="./img/clasico.gif" alt="Clasico" width="300" 
             onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">
        <p><i>Rolls-Royce Clásico</i></p>
    </div>

    <!-- Carro 3 -->
    <div class="carro">
        <img src="./img/neon.gif" alt="Neon" width="300" 
             onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">
        <p><i>Rolls-Royce Neón</i></p>
    </div>
<!-- CARRO 4: Lamborghini -->
<div class="carro">
    <img src="./img/lambo.gif" alt="Lamborghini King" 
         onmouseover="this.style.transform='scale(1.1)'" 
         onmouseout="this.style.transform='scale(1)'">
    <h3 style="font-style: italic; color: #D4AF37;">Lambo King Edition</h3>
    <p style="color: #FFF;"><i>Velocidad y Oro</i></p>
</div>

<!-- CARRO 5: Mercedes-Benz -->
<div class="carro">
    <img src="./img/mercedes.gif" alt="Mercedes Royal" 
         onmouseover="this.style.transform='scale(1.1)'" 
         onmouseout="this.style.transform='scale(1)'">
    <h3 style="font-style: italic; color: #D4AF37;">Mercedes Royal Benz</h3>
    <p style="color: #FFF;"><i>Elegancia Alemana</i></p>
</div>

<!-- CARRO 6: Rolls-Royce Rose Noire -->
<div class="carro">
    <img src="./img/rolls-royce-red.jpg" alt="Rose Noire" 
         onmouseover="this.style.transform='scale(1.1)'" 
         onmouseout="this.style.transform='scale(1)'">
    <h3 style="font-style: italic; color: #D4AF37;">Rolls-Royce Rose Noire</h3>
    <p style="color: #FFF;"><i>La Joya de la Corona</i></p>
</div>
